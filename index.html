<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SK Wood Flooring</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #111;
      color: #fff;
      text-align: center;
    }
    header {
      padding: 40px 20px;
      background: #222;
    }
    h1 {
      margin: 0;
      font-size: 32px;
    }
    p {
      opacity: 0.8;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 10px;
      padding: 20px;
    }
    .gallery img {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }
  </style>
</head>
<body>

<header>
  <h1>SK Wood Flooring</h1>
  <p>Professional Wood Flooring Specialists</p>
</header>

<section class="gallery">
  <img src="https://images.unsplash.com/photo-1600607687939-ce8a6c25118c">
  <img src="https://images.unsplash.com/photo-1582582494700-f8ce0b0a1e9f">
  <img src="https://images.unsplash.com/photo-1598300055699-86d0e66bb94f">
</section>

</body>
</html>
